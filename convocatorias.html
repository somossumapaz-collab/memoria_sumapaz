<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocatorias | Somos Sumapaz</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Static Cache-Busting -->
    <script>
        const timestamp = new Date().getTime();
        document.write(`<link rel="stylesheet" href="assets/styles.css?v=${timestamp}">`);
    </script>
    <style>
        .hero-section {
            position: relative;
            background-image: url('assets/fondo.jpg');
            background-size: cover;
            background-position: center;
            min-height: 200px;
            padding: 3rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            margin: -3rem -2rem 3rem -2rem;
            border-bottom: 5px solid var(--primary-green);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(68, 79, 47, 0.8) 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 1000px;
            width: 100%;
            padding: 0 2rem;
        }

        .hero-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .filter-box {
            background-color: #EFEBE4;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.5rem;
            color: #444F2F;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-reset {
            height: 50px;
            width: 220px;
            background-color: var(--primary-green);
            color: #FBF4DE;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .btn-reset:hover {
            background-color: #1B5E20;
        }
    </style>
</head>

<body>
    <header id="main-header">
        <nav class="navbar-custom">
            <div class="container" style="display: flex; align-items: center;">
                <a href="index.html">
                    <img src="assets/logo_somossumapaz.png" alt="Somos Sumapaz" class="logo-img">
                </a>
                <div class="search-container"
                    style="margin-left: auto; display: flex; align-items: center; gap: 1.5rem;">
                    <div id="header-links" style="display: flex; align-items: center; gap: 1rem;">

                        <div id="auth-links" style="display: flex; align-items: center; gap: 1rem;">
                            <!-- Only visible when logged in -->
                            <a href="productores_registrados.html" class="nav-link-btn" id="btn-dashboard"
                                style="display: none; margin: 0; background-color: transparent; color: #FBF4DE; border: none; font-weight: 600;">Dashboard</a>
                            <a href="transporte_seguimiento.html" class="nav-link-btn" id="btn-tracking"
                                style="display: none; margin: 0; background-color: transparent; color: #FBF4DE; border: none; font-weight: 600;">Seguimiento</a>
                            <button onclick="logout()" class="nav-link-btn" id="btn-logout"
                                style="display: none; margin: 0; background-color: transparent; cursor: pointer; color: #FBF4DE; border: none;"
                                title="Cerrar Sesión">
                                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                                    style="width: 24px; height: 24px; transform: scaleX(-1);">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                                </svg>
                            </button>
                        </div>

                        <a href="login.html" class="nav-link-btn" id="btn-login"
                            style="margin: 0; padding: 0.5rem; display: flex; align-items: center; justify-content: center; color: #FBF4DE;"
                            title="Iniciar Sesión">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                                style="width: 24px; height: 24px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main style="padding: 3rem 2rem 5rem 2rem; width: 100%; max-width: 100%; box-sizing: border-box;">
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title" style="color: #FBF4DE; margin-bottom: 0;">Convocatorias</h1>
                <p style="color: rgba(251, 244, 222, 0.9); font-size: 1.1rem; margin-top: 0.5rem;">Consulta los
                    productores vinculados a nuestras iniciativas</p>
            </div>
        </section>

        <div class="filter-box">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="filter-convocatoria">Convocatoria</label>
                    <select id="filter-convocatoria">
                        <option value="">Todas</option>
                        <option value="Inmersion Panaca">Inmersion Panaca</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-nombre">Nombre</label>
                    <input type="text" id="filter-nombre" placeholder="Buscar por nombre...">
                </div>
                <div class="filter-group">
                    <label for="filter-documento">Número de Documento</label>
                    <input type="text" id="filter-documento" placeholder="Buscar por documento...">
                </div>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 1.5rem;">
                <button type="button" class="btn-reset" id="btn-reset-filters">Limpiar Filtros</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="data-table" id="convocatorias-table">
                <thead>
                    <tr>
                        <th>Nombre del Productor</th>
                        <th>Vereda</th>
                        <th>Convocatoria</th>
                        <th>Fecha Resultado</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="convocatorias-tbody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 2rem;">Cargando información...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        let allData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            // Check auth for header state (but don't redirect if failed)
            try {
                const authRes = await fetch('api/check_auth.php');
                const authResult = await authRes.json();
                if (authResult.authenticated) {
                    document.getElementById('btn-login').style.display = 'none';
                    document.getElementById('btn-dashboard').style.display = 'inline-block';
                    document.getElementById('btn-tracking').style.display = 'inline-block';
                    document.getElementById('btn-logout').style.display = 'inline-block';
                }
            } catch (e) {
                console.error("Auth check failed", e);
            }

            // Load Data
            await loadData();

            // Setup Filters
            document.getElementById('filter-convocatoria').addEventListener('input', applyFilters);
            document.getElementById('filter-nombre').addEventListener('input', applyFilters);
            document.getElementById('filter-documento').addEventListener('input', applyFilters);
            document.getElementById('btn-reset-filters').addEventListener('click', () => {
                document.getElementById('filter-convocatoria').value = '';
                document.getElementById('filter-nombre').value = '';
                document.getElementById('filter-documento').value = '';
                applyFilters();
            });
        });

        async function loadData() {
            const tbody = document.getElementById('convocatorias-tbody');
            try {
                const res = await fetch('api/get_convocatorias.php');
                if (!res.ok) throw new Error('Network response was not ok');
                const result = await res.json();

                if (result.success) {
                    allData = result.data;
                    renderTable(allData);
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">${result.error || 'Error al cargar datos'}</td></tr>`;
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">Error de conexión.</td></tr>';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('convocatorias-tbody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem;">No se encontraron resultados.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.nombre_completo || 'N/A'}</td>
                    <td>${item.vereda || 'N/A'}</td>
                    <td>Inmersion Panaca</td>
                    <td>${item.fecha_convocatoria || 'N/A'}</td>
                    <td>${item.estado || 'N/A'}</td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const convocatoria = document.getElementById('filter-convocatoria').value;
            const nombre = document.getElementById('filter-nombre').value.toLowerCase();
            const documento = document.getElementById('filter-documento').value;

            const filtered = allData.filter(item => {
                const matchesConvocatoria = convocatoria === '' || "Inmersion Panaca".includes(convocatoria);
                const matchesNombre = item.nombre_completo.toLowerCase().includes(nombre);
                const matchesDocumento = item.numero_documento.toString().includes(documento);

                return matchesConvocatoria && matchesNombre && matchesDocumento;
            });

            renderTable(filtered);
        }

        async function logout() {
            try {
                await fetch('api/logout.php');
                window.location.reload();
            } catch (error) {
                console.error('Logout error:', error);
            }
        }
    </script>
</body>

</html>

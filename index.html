<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Sumapaz | Historias y Territorio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Static Cache-Busting & Asset Preparation -->
    <script>
        const timestamp = new Date().getTime();
        document.write(`<link rel="stylesheet" href="assets/styles.css?v=${timestamp}">`);
    </script>
</head>

<body>
    <!-- Static Header: Somos Sumapaz Design -->
    <header id="main-header">
        <nav class="navbar-custom">
            <div class="container">
                <a href="index.html">
                    <img src="assets/logo_somossumapaz.png" alt="Somos Sumapaz" class="logo-img">
                </a>
                <div class="search-container">
                    <span class="search-label">Busca el producto que necesitas</span>
                    <div class="search-bar">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Buscar...">
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1 class="serif" style="font-size: 3.5rem; color: var(--earth-brown); margin-bottom: 1rem;">Somos Sumapaz
            </h1>
            <p style="font-size: 1.2rem; max-width: 800px; margin: 0 auto; color: var(--text-muted);">
                Un territorio de vida, paz y resistencia. Historias de nuestra gente, el páramo más grande del mundo y
                los productos que nacen de nuestra tierra con identidad y amor.
            </p>
        </section>

        <!-- Contenido de Somos Sumapaz -->
        <div id="posts-container" class="post-list">
            <!-- Las publicaciones se cargarán aquí -->
        </div>
    </main>

    <!-- Dynamic JS with Cache-Busting -->
    <script>
        const script = document.createElement('script');
        script.type = 'module';
        script.src = `assets/main.js?v=${new Date().getTime()}`;
        document.body.appendChild(script);
    </script>
</body>

</html>

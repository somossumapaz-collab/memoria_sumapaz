<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Sumapaz | Historias y Territorio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Dynamic Cache-Busting Script -->
    <script>
        /**
         * Cache-Busting Implementation
         * Generates a unique timestamp to force the browser to load the latest version of assets.
         */
        (function () {
            const timestamp = new Date().getTime();

            // Dynamically load CSS
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = `assets/styles.css?v=${timestamp}`;
            document.head.appendChild(link);

            // Dynamically load main.js as a module
            // This ensures main.js and its imports are handled correctly by the browser
            const script = document.createElement('script');
            script.type = 'module';
            script.src = `assets/main.js?v=${timestamp}`;
            document.body.appendChild(script);
        })();
    </script>
</head>

<body>
    <header id="main-header"></header>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1 class="serif" style="font-size: 3.5rem; color: var(--earth-brown); margin-bottom: 1rem;">Somos Sumapaz
            </h1>
            <p style="font-size: 1.2rem; max-width: 800px; margin: 0 auto; color: var(--text-muted);">
                Un territorio de vida, paz y resistencia. Historias de nuestra gente, el páramo más grande del mundo y
                los productos que nacen de nuestra tierra con identidad y amor.
            </p>
        </section>

        <!-- Contenido de Somos Sumapaz -->
        <div id="posts-container" class="post-list">
            <!-- Las publicaciones se cargarán aquí -->
        </div>
    </main>
</body>

</html>
